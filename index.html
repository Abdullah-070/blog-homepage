<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Blog Homepage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="blog-title">TechLife Blog</h1>
            <p class="blog-tagline">Exploring technology, travel, and culinary adventures</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Search and Filters -->
            <div class="controls">
                <div class="search-container">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Search posts by title..."
                    >
                    <span class="search-icon">🔍</span>
                </div>
                
                <div class="category-filters">
                    <button class="filter-btn active" data-category="all">All Posts</button>
                    <button class="filter-btn" data-category="tech">Tech</button>
                    <button class="filter-btn" data-category="travel">Travel</button>
                    <button class="filter-btn" data-category="food">Food</button>
                </div>
            </div>

            <!-- Posts Grid -->
            <div class="posts-grid" id="postsGrid">
                <!-- Posts will be dynamically generated -->
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button class="pagination-btn" id="prevBtn">← Previous</button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="pagination-btn" id="nextBtn">Next →</button>
            </div>

            <!-- No Results Message -->
            <div class="no-results" id="noResults">
                <div class="no-results-icon">📝</div>
                <h3>No posts found</h3>
                <p>Try adjusting your search or filter criteria.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
